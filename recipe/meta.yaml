{% set name = "azure-cli" %}
{% set version = "2.85.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 7a83ed8e69f8acdbc6f2a7e0cb1268360ea54b02e2525113934ead735bd4420f

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<310]

requirements:
  host:
    - python
    - pip
    # azure/__init__.py:1: UserWarning: pkg_resources is deprecated as an API.
    # See https://setuptools.pypa.io/en/latest/pkg_resources.html.
    # The pkg_resources package is slated for removal as early as 2025-11-30.
    # Refrain from using this package or pin to Setuptools<81.0.0.
    - setuptools <81.0.0
    - wheel
  run:
    - python
    - antlr4-python3-runtime >=4.13.1,<4.14.0
    - azure-appconfiguration >=1.7.2,<1.8.0
    - azure-ai-projects >=1.0.0,<1.1.0
    - azure-batch ==15.0.0b1
    - azure-cli-core =={{ version }}
    - azure-cosmos >=3.0.2,<4.0.0
    - azure-data-tables ==12.4.0
    - azure-datalake-store >=1.0.1,<1.1.0
    - azure-keyvault-administration ==4.4.0
    - azure-keyvault-certificates ==4.7.0
    - azure-keyvault-keys ==4.11.0
    - azure-keyvault-secrets ==4.7.0
    - azure-keyvault-securitydomain ==1.0.0b1
    - azure-mgmt-advisor ==9.0.0
    - azure-mgmt-apimanagement ==4.0.0
    - azure-mgmt-appconfiguration ==6.0.0b1
    - azure-mgmt-appcontainers ==2.0.0
    - azure-mgmt-applicationinsights >=1.0.0,<1.1.0
    - azure-mgmt-authorization ==5.0.0b1
    - azure-mgmt-batchai ==7.0.0b1
    - azure-mgmt-batch >=17.3.0,<17.4.0
    - azure-mgmt-billing ==6.0.0
    - azure-mgmt-botservice >=2.0.0b3,<2.1.0
    - azure-mgmt-cdn ==12.0.0
    - azure-mgmt-cognitiveservices >=14.1.0,<14.2.0
    - azure-mgmt-compute >=34.1.0,<34.2.0
    - azure-mgmt-containerinstance ==10.2.0b1
    - azure-mgmt-containerregistry ==15.1.0b1
    - azure-mgmt-containerregistrytasks ==1.0.0b1
    - azure-mgmt-containerservice >=41.0.0,<41.1.0
    - azure-mgmt-cosmosdb ==9.9.0
    - azure-mgmt-datalake-store >=1.1.0b1,<1.2.0
    - azure-mgmt-datamigration >=10.0.0,<10.1.0
    - azure-mgmt-eventgrid ==10.2.0b2
    - azure-mgmt-eventhub >=12.0.0b1,<12.1.0
    - azure-mgmt-extendedlocation ==1.0.0b2
    - azure-mgmt-hdinsight ==9.1.0b2
    - azure-mgmt-imagebuilder >=1.3.0,<1.4.0
    - azure-mgmt-iotcentral >=10.0.0b1,<10.1.0
    - azure-mgmt-iothub ==5.0.0b1
    - azure-mgmt-iothubprovisioningservices ==1.1.0
