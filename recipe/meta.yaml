    - azure-monitor-query ==1.2.0
    - azure-storage-common >=1.4,<2.0
    - azure-storage-blob ==12.28.0b1
    - azure-storage-file-datalake ==12.23.0b1
    - azure-storage-file-share ==12.24.0b1
    - azure-storage-queue ==12.15.0b1
    - azure-synapse-accesscontrol >=0.5.0,<0.6.0
    - azure-synapse-artifacts >=0.22.0,<0.23.0
    - azure-synapse-managedprivateendpoints >=0.4.0,<0.5.0
    - azure-synapse-spark >=0.7.0,<0.8.0
    - chardet >=5.2.0,<5.3.0
    - colorama >=0.4.4,<0.5.0
    - distro  # [linux]
    - fabric >=3.2.2,<3.3.0
    - javaproperties >=0.5.1,<0.6.0
    - jsondiff >=2.0.0,<2.1.0
    - packaging >=20.9
